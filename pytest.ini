[pytest]
addopts = -v -s --disable-warnings --strict-markers --html=reports/web/pytest_report.html --self-contained-html
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
log_cli = true
log_cli_level = INFO
markers =
    web: Web Playwright tests
    smoke: Fast build-verification tests for critical app availability
    regression: Broader release regression coverage
    crud: Create/read/update/delete workflows that require safe test data cleanup
    rbac: Role-based access and permission tests
    live: Tests that intentionally call the live LMS environment
