name: Web Automation CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      suite:
        description: Test suite to run
        required: true
        default: smoke
        type: choice
        options:
          - smoke
          - regression
          - rbac
          - crud

jobs:
  web-tests:
    name: Run web automation tests
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      LMS_BASE_URL: ${{ secrets.LMS_BASE_URL || 'https://lms.gyaanplant.co.in' }}
      LMS_EMAIL: ${{ secrets.LMS_EMAIL }}
      LMS_PASSWORD: ${{ secrets.LMS_PASSWORD }}
      LMS_ADMIN_EMAIL: ${{ secrets.LMS_ADMIN_EMAIL }}
      LMS_ADMIN_PASSWORD: ${{ secrets.LMS_ADMIN_PASSWORD }}
      LMS_COLLEGE_ADMIN_EMAIL: ${{ secrets.LMS_COLLEGE_ADMIN_EMAIL }}
      LMS_COLLEGE_ADMIN_PASSWORD: ${{ secrets.LMS_COLLEGE_ADMIN_PASSWORD }}
      LMS_STUDENT_EMAIL: ${{ secrets.LMS_STUDENT_EMAIL }}
      LMS_STUDENT_PASSWORD: ${{ secrets.LMS_STUDENT_PASSWORD }}
      LMS_STUDENT_SECONDARY_EMAIL: ${{ secrets.LMS_STUDENT_SECONDARY_EMAIL }}
      LMS_STUDENT_SECONDARY_PASSWORD: ${{ secrets.LMS_STUDENT_SECONDARY_PASSWORD }}
      LMS_TPO_EMAIL: ${{ secrets.LMS_TPO_EMAIL }}
      LMS_TPO_PASSWORD: ${{ secrets.LMS_TPO_PASSWORD }}
      LMS_HOD_EMAIL: ${{ secrets.LMS_HOD_EMAIL }}
      LMS_HOD_PASSWORD: ${{ secrets.LMS_HOD_PASSWORD }}
      LMS_MENTOR_EMAIL: ${{ secrets.LMS_MENTOR_EMAIL }}
      LMS_MENTOR_PASSWORD: ${{ secrets.LMS_MENTOR_PASSWORD }}
      WEB_HEADLESS: "true"
      WEB_TRACE_MODE: retain-on-failure
      WEB_TEST_ID_ATTRIBUTE: data-testid
      WEB_ARTIFACTS_DIR: reports/web

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirement.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirement.txt

      - name: Install Playwright Chromium
        run: playwright install --with-deps chromium

      - name: Select pytest command
        shell: bash
        run: |
          SUITE="${{ github.event.inputs.suite || 'smoke' }}"

          case "$SUITE" in
            smoke)
              echo 'PYTEST_MARKER=web and smoke' >> "$GITHUB_ENV"
              echo 'PYTEST_EXTRA_ARGS=' >> "$GITHUB_ENV"
              ;;
            regression)
              echo 'PYTEST_MARKER=web and regression and not crud' >> "$GITHUB_ENV"
              echo 'PYTEST_EXTRA_ARGS=' >> "$GITHUB_ENV"
              ;;
            rbac)
              echo 'PYTEST_MARKER=web and rbac' >> "$GITHUB_ENV"
              echo 'PYTEST_EXTRA_ARGS=' >> "$GITHUB_ENV"
              ;;
            crud)
              echo 'PYTEST_MARKER=web and crud' >> "$GITHUB_ENV"
              echo 'PYTEST_EXTRA_ARGS=--run-live-crud' >> "$GITHUB_ENV"
              ;;
            *)
              echo "Unsupported suite: $SUITE" >&2
              exit 1
              ;;
          esac

      - name: Run selected suite
        run: pytest -m "$PYTEST_MARKER" $PYTEST_EXTRA_ARGS -q

      - name: Upload web test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-test-artifacts-${{ github.run_id }}
          path: |
            reports/web/pytest_report.html
            reports/web/screenshots/
            reports/web/traces/
          if-no-files-found: ignore
